#Reads 2 types of logs → Labels them → Filters noise → Sends to Loki

server:
  http_listen_port: 9080
clients:
  - url: http://loki:3100/loki/api/v1/push
scrape_configs:
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog.log
  - job_name: docker-json
    static_configs:
      - targets:
          - localhost
        labels:
          job: json-file
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - json:
          expressions:
            message: log
            stream: stream
      - output:
          source: message
      - match:
          pipeline_name: drop-garbled
          selector: '{job="json-file"}'
          stages:
            - drop:
                expression: '.*stdout.*SYSLOG.*'
                drop_counter_reason: syslog_in_json
            - drop:
                expression: '.*level=info.*'
                drop_counter_reason: internal_logs
